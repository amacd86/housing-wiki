{% extends "base.html" %}
{% block title %}{% if entry %}Edit{% else %}New Entry{% endif %} — Housing Wiki{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <div class="page-eyebrow">
            <a href="/">Home</a> /
            <a href="/section/{{ section.id }}">{{ section.label }}</a>
        </div>
        <h1 class="page-title">{% if entry %}Edit Entry{% else %}New Entry{% endif %}</h1>
    </div>
</div>

<form method="post" class="edit-form">
    <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-input" value="{{ entry.title if entry else '' }}" required placeholder="Entry title...">
    </div>

    <div class="form-group">
        <label class="form-label">Body <span class="form-hint">Markdown supported</span></label>
        <textarea name="body" class="form-textarea" rows="18" placeholder="Write your notes here. **bold**, *italic*, ## headings, - bullet lists all work.">{{ entry.body if entry else '' }}</textarea>
    </div>

    <div class="form-group">
        <label class="form-label">Tags <span class="form-hint">comma separated</span></label>
        <input type="text" name="tags" class="form-input" value="{{ entry.tags | join(', ') if entry else '' }}" placeholder="e.g. zoning, state law, Portsmouth">
    </div>

    <div class="form-actions">
        <a href="/section/{{ section.id }}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-save">Save Entry</button>
    </div>
</form>
{% endblock %}
